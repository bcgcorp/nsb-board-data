name = "nsb-board"
main = "worker.js"
compatibility_date = "2026-05-31"
workers_dev = true

# Workers KV namespace that stores user state (decisions, score overrides, photos).
# The Worker reads/writes it as env.NSB_KV.
# Replace the id below with your real namespace id. Find it with:
#   wrangler kv namespace list
kv_namespaces = [
  { binding = "NSB_KV", id = "REPLACE_WITH_NSB_KV_NAMESPACE_ID" }
]

# VIEW_KEY (the board's share-link access key) is intentionally NOT defined here —
# this repo is public, so it must stay a secret. Set it once, out of band:
#   wrangler secret put VIEW_KEY        (enter the current key, e.g. greysteph-ocean)
# or via the Cloudflare dashboard (Workers > nsb-board > Settings > Variables).
# The Worker reads it as env.VIEW_KEY; secrets are preserved across deploys.
